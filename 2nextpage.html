<!DOCTYPE html>
<html>
<head>
<title>E-LMIS Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#0b3d91;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
}

</style>
</head>

<body>

<div class="form-box">

<h2>Personal Information</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="Address">

<h3>Upload Receipt</h3>

<input type="file">

<button>Submit</button>

</div>

</body>
</html>
