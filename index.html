<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministry of Labor and Skills</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* MOVING BACKGROUND */

.hero{
height:100vh;
background-image:url("https://e-lmis-online.netlify.app/image/photo_1_2025-11-29_18-19-07.jpg");
background-size:cover;
background-position:center;
animation:movebg 20s infinite alternate;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

@keyframes movebg{

0%{background-position:center top;}

100%{background-position:center bottom;}

}

.hero h1{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}

/* NEWS SECTION */

.news{
padding:30px;
text-align:center;
}

.news-container{
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.news-card{
background:white;
width:90%;
max-width:420px;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.news-card img{
width:100%;
height:200px;
object-fit:cover;
}

.news-card h3{
padding:10px;
margin:0;
}

.news-card p{
padding:0 10px 15px;
font-size:14px;
color:gray;
}

/* CODE BOX */

.codebox{
background:white;
padding:30px;
margin:30px;
border-radius:10px;
text-align:center;
}

input{
padding:12px;
width:80%;
font-size:16px;
}

button{
padding:12px 25px;
background:#0b3d91;
color:white;
border:none;
margin-top:10px;
}

footer{
background:#0b3d91;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<!-- MOVING IMAGE HEADER -->

<div class="hero">

<h1>Ministry of Labor and Skills</h1>

</div>

<!-- NEWS -->

<div class="news">

<h2>Latest News</h2>

<div class="news-container">

<div class="news-card">
<img src="https://e-lmis-online.netlify.app/image/photo_1_2025-11-29_18-19-07.jpg">
<h3>Government Service Reform</h3>
<p>March 7, 2026</p>
</div>

<div class="news-card">
<img src="https://e-lmis-online.netlify.app/image/photo_3_2025-11-29_18-58-10.jpg">
<h3>Labor Market Information System Development</h3>
<p>March 7, 2026</p>
</div>

<div class="news-card">
<img src="https://e-lmis-online.netlify.app/image/photo_4_2025-11-29_18-58-10.jpg">
<h3>Bright Nation Innovation Competition</h3>
<p>March 7, 2026</p>
</div>

</div>

</div>

<!-- CODE -->

<div class="codebox">

<h2>Enter Your 6-Digit Code</h2>

<input type="text" id="code" maxlength="6">

<br><br>

<button onclick="checkCode()">Submit</button>

<p id="msg"></p>

</div>

<footer>

<p>Tel: +251 116 671792</p>
<p>Email: info@mols.gov.et</p>

<p>© 2026 All Rights Reserved</p>

</footer>

<script>

function checkCode(){

let code=document.getElementById("code").value;

if(code=="460067"){

window.location.href="personal.html";

}

else{

document.getElementById("msg").innerHTML="Invalid Code";

}

}

</script>

</body>
</html>
