<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-LMIS</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
text-align:center;
}

header{
background:#1f5fa8;
color:white;
padding:15px;
font-size:22px;
}

.container{
max-width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
color:#1f5fa8;
}

.am{
font-size:18px;
color:#444;
margin-bottom:20px;
}

input{
width:90%;
padding:15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:14px 40px;
font-size:18px;
background:#1f5fa8;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

#msg{
margin-top:10px;
color:red;
}

.profile{
display:none;
max-width:400px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
margin-bottom:15px;
}

.info{
color:#555;
}

</style>

</head>

<body>

<header>
E-LMIS
</header>

<div class="container" id="login">

<h2>Enter Your 6-Digit Code</h2>

<div class="am">ELMIS ኮድ አስገባ</div>

<input type="text" id="code" maxlength="6" placeholder="Enter 6-digit number">

<br>

<button onclick="checkCode()">Submit</button>

<p id="msg"></p>

</div>

<div class="profile" id="profile">

<img src="https://i.imgur.com/4Z7Dz5K.png">

<h3>Abel Tesfaye</h3>

<p class="info">ID: 460067</p>

<p class="info">Region: Oromia</p>

<p class="info">Training: Information Technology</p>

<button onclick="window.print()">Download ID</button>

</div>

<script>

function checkCode(){

let code=document.getElementById("code").value;

if(code==="460067"){

document.getElementById("login").style.display="none";
document.getElementById("profile").style.display="block";

}else{

document.getElementById("msg").innerHTML="የገባው ኮድ ትክክል አይደለም";

}

}

</script>

</body>
</html>
