<!DOCTYPE html>
<html>
<head>
<title>E-LMIS Login</title>
<style>
body{
  font-family: Arial;
  background: linear-gradient(to right,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:white;
  padding:30px;
  border-radius:8px;
  width:300px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  width:100%;
  padding:10px;
  background:#2a5298;
  color:white;
  border:none;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a href="signup.html">Create Account</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVAAbKGCRENoX20XcSSJNuyuZvPgvIHhc",
  authDomain: "work12-eec29.firebaseapp.com",
  projectId: "work12-eec29",
  storageBucket: "work12-eec29.firebasestorage.app",
  messagingSenderId: "901174825773",
  appId: "1:901174825773:web:4273daaefc37c7015d39a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,password)
  .then(()=>{ window.location="dashboard.html"; })
  .catch(err=> alert(err.message));
}
</script>

</body>
</html>
