<h2>Signup</h2>
<input type="email" id="signup-email" placeholder="Email"><br><br>
<input type="password" id="signup-password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>

<hr>

<h2>Login</h2>
<input type="email" id="login-email" placeholder="Email"><br><br>
<input type="password" id="login-password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVAAbKGCRENoX20XcSSJNuyuZvPgvIHhc",
  authDomain: "work12-eec29.firebaseapp.com",
  projectId: "work12-eec29",
  storageBucket: "work12-eec29.firebasestorage.app",
  messagingSenderId: "901174825773",
  appId: "1:901174825773:web:4273daaefc37c7015d39a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function() {
  const email = document.getElementById("signup-email").value;
  const password = document.getElementById("signup-password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Signup successful"))
    .catch(error => alert(error.message));
}

window.login = function() {
  const email = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login successful"))
    .catch(error => alert(error.message));
}

window.logout = function() {
  signOut(auth)
    .then(() => alert("Logged out"));
}
</script>
