
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="email" placeholder="Email"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVAAbKGCRENoX20XcSSJNuyuZvPgvIHhc",
  authDomain: "work12-eec29.firebaseapp.com",
  projectId: "work12-eec29",
  storageBucket: "work12-eec29.firebasestorage.app",
  messagingSenderId: "901174825773",
  appId: "1:901174825773:web:4273daaefc37c7015d39a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.querySelector("button").addEventListener("click", function() {
  const email = document.querySelector("input[type='email']").value;
  const password = document.querySelector("input[type='password']").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      alert("Login Failed: " + error.message);
    });
});
</script>

</body>
</html>
