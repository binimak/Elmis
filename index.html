<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry of Labor and Skills</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* FULL SCREEN BACKGROUND */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1521791136064-7986c2920216") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:10px;
}

/* NEWS */

.news{
padding:20px;
background:#f5f5f5;
}

.news h2{
text-align:center;
}

.card{
background:white;
margin:20px auto;
width:90%;
max-width:400px;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
}

.card h3{
padding:10px;
margin:0;
}

.card p{
padding:0 10px 15px;
color:gray;
}

/* CODE */

.codebox{
text-align:center;
padding:30px;
}

input{
padding:10px;
font-size:16px;
width:200px;
}

button{
padding:10px 20px;
background:#0b3d91;
color:white;
border:none;
margin-top:10px;
}

footer{
background:#0b3d91;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<div class="hero">
<h1>Ministry of Labor and Skills</h1>
</div>

<div class="news">

<h2>Latest News</h2>

<div class="card">
<img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf">
<h3>Government Reform Program</h3>
<p>March 2026</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<h3>Labor Market System Development</h3>
<p>March 2026</p>
</div>

</div>

<div class="codebox">

<h2>Enter Your Code</h2>

<input type="text" id="code" maxlength="6">

<br><br>

<button onclick="checkCode()">Submit</button>

<p id="msg"></p>

</div>

<footer>

<p>Tel: +251 116 671792</p>
<p>Email: info@mols.gov.et</p>

</footer>

<script>

function checkCode(){

var code=document.getElementById("code").value;

if(code=="460067"){

window.location.href="personal.html";

}

else{

document.getElementById("msg").innerHTML="Invalid Code";

}

}

</script>

</body>
</html>
