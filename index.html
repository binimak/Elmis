<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry of Labor and Skills</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0b3d91;
color:white;
padding:20px;
text-align:center;
}

.nav{
background:#072c6b;
display:flex;
justify-content:center;
gap:20px;
padding:12px;
flex-wrap:wrap;
}

.nav a{
color:white;
text-decoration:none;
font-size:15px;
}

.codebox{
background:white;
padding:40px;
margin:60px auto;
border-radius:10px;
text-align:center;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:12px;
width:80%;
font-size:16px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 30px;
background:#0b3d91;
color:white;
border:none;
margin-top:15px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#0b3d91;
color:white;
padding:25px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h2>Ministry of Labor and Skills</h2>
</header>

<div class="nav">
<a href="#">Home</a>
<a href="#">News</a>
<a href="#">FAQ</a>
<a href="#">Contact</a>
</div>

<div class="codebox">

<h2>Enter Your 6 Digit Code</h2>

<input type="text" id="code" maxlength="6" placeholder="Enter Code">

<br>

<button onclick="checkCode()">Submit</button>

<p id="msg" style="color:red"></p>

</div>

<footer>

<h3>Contact Us</h3>
<p>Tel: +251 116 671792</p>
<p>Email: info@mols.gov.et</p>

</footer>

<script>

let users={}

for(let i=1;i<=100;i++){

let code=464600+i;

users[code]={

name:"User "+i,
gender:i%2==0?"Female":"Male",
age:20+i,
region:"Addis Ababa",
job:"Worker",
photo:"https://i.pravatar.cc/200?img="+i

}

}

function checkCode(){

let code=document.getElementById("code").value;

if(code.length!=6){
document.getElementById("msg").innerHTML="Code must be 6 digits";
return;
}

if(users[code]){
localStorage.setItem("user",JSON.stringify(users[code]));
window.location.href="personal.html";
}

else{
document.getElementById("msg").innerHTML="Invalid Code";
}

}

</script>

</body>
</html>
