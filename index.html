<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body{ margin:0; font-family:Arial; background:#f4f6f9;}
    .header{ background:#2a5298; color:white; padding:15px; text-align:center;}
    .content{ padding:20px;}
    .card{ background:white; padding:20px; border-radius:10px; margin-bottom:20px;}
    input{ padding:8px; margin:5px; }
    button{ padding:8px 12px; background:#2a5298; color:white; border:none; border-radius:5px; cursor:pointer;}
    table{ width:100%; border-collapse:collapse; margin-top:15px;}
    th,td{ border:1px solid #ddd; padding:8px; text-align:center;}
    th{ background:#2a5298; color:white;}
  </style>
</head>
<body>

<div class="header">E-LMIS Dashboard</div>

<div class="content">

  <div class="card">
    <h3>Add Product</h3>
    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="quantity" placeholder="Quantity">
    <button onclick="addProduct()">Add</button>
  </div>

  <div class="card">
    <h3>Stock List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody id="productList"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVAAbKGCRENoX20XcSSJNuyuZvPgvIHhc",
  authDomain: "work12-eec29.firebaseapp.com",
  projectId: "work12-eec29",
  appId: "1:901174825773:web:4273daaefc37c7015d39a4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function(){
  const name = document.getElementById("name").value;
  const quantity = document.getElementById("quantity").value;

  if(!name || !quantity) return alert("Fill all fields");

  await addDoc(collection(db, "products"), {
    name: name,
    quantity: quantity
  });

  alert("Product Added");
  loadProducts();
};

async function loadProducts(){
  const querySnapshot = await getDocs(collection(db, "products"));
  const table = document.getElementById("productList");
  table.innerHTML = "";

  querySnapshot.forEach((doc)=>{
    const data = doc.data();
    table.innerHTML += `
      <tr>
        <td>${data.name}</td>
        <td>${data.quantity}</td>
      </tr>
    `;
  });
}

loadProducts();
</script>

</body>
</html>
