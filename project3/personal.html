<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:15px;
}

h2{
margin-bottom:10px;
}

p{
margin:6px 0;
color:#444;
}

</style>
</head>

<body>

<div class="card">
<img id="photo">
<h2 id="name"></h2>

<p><b>Visa Type:</b> <span id="visa"></span></p>
<p><b>Job:</b> <span id="job"></span></p>
<p><b>Employer:</b> <span id="employer"></span></p>
<p><b>Location:</b> <span id="location"></span></p>
<p><b>From:</b> <span id="from"></span></p>
<p><b>To:</b> <span id="to"></span></p>

</div>

<script>

// GET DATA
let user = JSON.parse(localStorage.getItem("user"));

if(user){

document.getElementById("photo").src = user.photo;
document.getElementById("name").innerText = user.name;
document.getElementById("visa").innerText = user.visaType;
document.getElementById("job").innerText = user.job;
document.getElementById("employer").innerText = user.employer;
document.getElementById("location").innerText = user.location;
document.getElementById("from").innerText = user.from;
document.getElementById("to").innerText = user.to;

}else{

document.body.innerHTML = "<h2>❌ No User Data Found</h2>";

}

</script>

</body>
</html>
