<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:black;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

/* CONTAINER */
.container{
padding:20px;
display:flex;
flex-direction:column;
gap:30px;
align-items:center;
}

/* CARD */
.card{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
text-align:center;
}

/* FULL IMAGE */
.full-image{
width:100%;
height:100vh;
position:relative;
}

.full-image img{
width:100%;
height:100%;
object-fit:cover;
}

/* DOCUMENT BOX */
.document-box{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
text-align:center;
}

/* VERIFY */
.verify{
text-align:center;
margin:40px 0;
}

input{
padding:12px;
border:none;
border-radius:6px;
width:200px;
}

button{
padding:12px 20px;
border:none;
background:#f6b93b;
color:black;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#fa983a;
}

footer{
text-align:center;
padding:20px;
}

</style>
</head>
