<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:black;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

/* CONTAINER */
.container{
padding:20px;
display:flex;
flex-direction:column;
gap:30px;
align-items:center;
}

/* CARD */
.card{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
text-align:center;
}

/* FULL IMAGE */
.full-image{
width:100%;
height:100vh;
position:relative;
}

.full-image img{
width:100%;
height:100%;
object-fit:cover;
}

/* DOCUMENT BOX */
.document-box{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
text-align:center;
}

/* VERIFY */
.verify{
text-align:center;
margin:40px 0;
}

input{
padding:12px;
border:none;
border-radius:6px;
width:200px;
}

button{
padding:12px 20px;
border:none;
background:#f6b93b;
color:black;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#fa983a;
}

footer{
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<h2>🇪🇹 ETHIOPIA ILLUMINATY 🇺🇸</h2>
<nav>
<a href="#">Home</a>
<a href="#">Money</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="hero">
<h1>🇪🇹 ETHIOPIA ILLUMINATY 🇺🇸</h1>
<p>ኢትዮጵያ ኢሉሚናቲ ማህበር</p>
<p>በኢትዮጵያ በመመዝገብ ህይወችሁን ይቀይሩ</p>
</div>

<div class="container">

<!-- HOUSE -->
<div class="card">
<h3>House</h3>
<p>ገንዘብ ድጋፍ የሚደረግበት እድል</p>
</div>

<!-- DOCUMENT -->
<div class="full-image">
<h3>Document</h3>
<p>የእርስዎ ሰነድ</p>
<img src="https://i.postimg.cc/nc6Cf11s/bdd8fdc363fa27865bd7420b820c4eba.jpg", style="width:100%;border-radius:10px;">
</div>

<!-- MONEY -->
<div class="card">
<h3>Money</h3>
<p> ከ700,000ሺህ -1,000,000ብር ገንዘብ
 ቅድመ ክፍያ አለዉ ፈጥነዉ ይመዝገቡ.</p>
</div>

</div>

<!-- FULL IMAGE (Money በታች) -->
<div class="full-image">
<img src="https://i.postimg.cc/Jzt5GWdm/IMG-20260320-013254-060.jpg">
</div>

<!-- VERIFY -->
<div class="verify">
<h2> ሚስጢር ኮድ ያስገቡ</h2>
<input type="text" id="visa">
<button onclick="checkVisa()">Verify</button>
<p id="result"></p>
</div>

<footer>
<p>© 2028</p>
</footer>

<script>

var users = {
"1111":"Approved ✅",
"2222":"Processing ⏳",
"3333":"Rejected ❌"
};

function checkVisa(){
var code = document.getElementById("visa").value;

if(users[code]){
document.getElementById("result").innerText = users[code];
}else{
document.getElementById("result").innerText = "Invalid ❌";
}
}

</script>

</body>
</html>
