<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h1>Welcome to Dashboard 🎉</h1>
<p id="email"></p>
<button id="logout">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVAAbKGCRENoX20XcSSJNuyuZvPgvIHhc",
  authDomain: "work12-eec29.firebaseapp.com",
  projectId: "work12-eec29",
  storageBucket: "work12-eec29.firebasestorage.app",
  messagingSenderId: "901174825773",
  appId: "1:901174825773:web:4273daaefc37c7015d39a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("email").innerText =
      "Logged in as: " + user.email;
  } else {
    window.location.href = "index.html";
  }
});

document.getElementById("logout").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
});

</script>

</body>
</html>
