<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f1f5f9;
}

.box{
margin-top:100px;
background:white;
padding:30px;
border-radius:15px;
width:300px;
margin-left:auto;
margin-right:auto;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.ok{
color:green;
font-size:22px;
}

.bad{
color:red;
font-size:22px;
}
</style>
</head>

<body>

<div class="box">
<h2>Checking...</h2>
<p id="result"></p>
</div>

<script>

// VALID IDS (manual system)
let validIds = ["12345","67890","11111"];

let id = new URLSearchParams(window.location.search).get("id");

if(validIds.includes(id)){

document.getElementById("result").innerHTML =
"<span class='ok'>✔ Verified</span><br><br>" +
"<a href='personal.html'>View Profile</a>";

}else{

document.getElementById("result").innerHTML =
"<span class='bad'>❌ Invalid ID</span>";

}

</script>

</body>
</html>
