<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illuminati</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
}

/* HERO SECTION */

.hero{
background-image:url("project2/image/Screenshot_20260313-223016~2.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TITLE */

.hero h1{
font-size:50px;
color:red;
margin:0;
}

.hero h2{
font-size:35px;
color:red;
margin:10px 0;
}

/* INPUT */

input{
padding:12px;
width:200px;
border:none;
border-radius:6px;
font-size:16px;
text-align:center;
margin-top:20px;
}

/* BUTTON */

button{
background:#b32045;
color:white;
padding:12px 30px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

/* FOOTER */

footer{
background:black;
color:white;
padding:15px;
position:absolute;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<div class="hero">

<h1>Welcome</h1>
<h2>Enter 6 Digit Code</h2>

<input type="text" placeholder="6 Digit Code" maxlength="6">

</div>

<footer>
© 2026 Illuminati Portal
</footer>

</html>
