<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illuminati Portal</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
}

/* HERO */

.hero{
background-image:url("photo.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TITLES */

.hero h1{
font-size:50px;
color:red;
margin:0;
}

.hero h2{
font-size:35px;
color:red;
margin:10px 0;
}

/* INPUT */

input{
padding:12px;
width:220px;
border:none;
border-radius:6px;
font-size:16px;
text-align:center;
margin-top:20px;
}

/* BUTTON */

button{
background:#b32045;
color:white;
padding:12px 30px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

/* FOOTER */

footer{
background:black;
color:white;
padding:15px;
position:absolute;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<div class="hero">

<h1>Welcome</h1>
<h2>Enter 6 Digit Code</h2>

<input id="code" type="text" placeholder="6 Digit Code" maxlength="6">

<br>

<button onclick="checkCode()">Submit</button>

</div>

<footer>
© 2026 Illuminati Portal
</footer>

<script>

function checkCode(){

let code = document.getElementById("code").value;

if(code.length == 6){
window.location.href="personal.html";
}else{
alert("Enter valid 6 digit code");
}

}

</script>

</body>
</html>
