<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Information</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

/* logo */

.logo img{
width:120px;
margin-top:20px;
}

/* title */

h1{
color:#2f5d94;
}

/* card */

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
border:4px solid #2f5d94;
}

/* profile photo */

.profile img{
width:80px;
height:80px;
border-radius:50%;
border:4px solid #2f5d94;
object-fit:cover;
}

/* table */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
padding:12px;
border-bottom:1px dashed #ccc;
}

.label{
text-align:left;
color:#2f5d94;
font-weight:bold;
}

.value{
text-align:right;
}

/* verified */

.verified{
background:#28a745;
color:white;
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

/* document slider */

.document-box{
position:relative;
background:white;
margin:20px auto;
padding:10px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
max-width:700px;
}

.document-box img{
width:100%;
border-radius:10px;
}

.prev,.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:#666;
color:white;
border:none;
padding:10px 15px;
font-size:20px;
border-radius:6px;
cursor:pointer;
}

.prev{left:5px;}
.next{right:5px;}

</style>

</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<h1>Personal Information</h1>

<div class="card">

<div class="profile">
<img src="photo.jpg">
</div>

<table>

<tr>
<td class="label">Name</td>
<td class="value">TEMESGEN ADISU GANTA</td>
</tr>

<tr>
<td class="label">Gender</td>
<td class="value">Male</td>
</tr>

<tr>
<td class="label">Age</td>
<td class="value">19</td>
</tr>

<tr>
<td class="label">Date of Birth</td>
<td class="value">2005-05-10</td>
</tr>

<tr>
<td class="label">E-LMIS ID Number</td>
<td class="value">622906</td>
</tr>

<tr>
<td class="label">Passport Number</td>
<td class="value">EQ8179818</td>
</tr>

<tr>
<td class="label">Phone Number</td>
<td class="value">+251 900000000</td>
</tr>

<tr>
<td class="label">Place of Birth</td>
<td class="value">Addis Ababa</td>
</tr>

<tr>
<td class="label">Visa Type</td>
<td class="value">Work Visa</td>
</tr>

<tr>
<td class="label">Status</td>
<td class="value"><span class="verified">✔ Verified</span></td>
</tr>

</table>

</div>

<!-- document photos -->

<div class="document-box">

<button class="prev" onclick="prev()">❮</button>

<img id="doc" src="doc1.jpg">

<button class="next" onclick="next()">❯</button>

</div>

<script>

var docs=[
"doc1.jpg",
"doc2.jpg",
"doc3.jpg",
"doc4.jpg"
];

var i=0;

function show(){
document.getElementById("doc").src=docs[i];
}

function next(){
i++;
if(i>=docs.length){i=0;}
show();
}

function prev(){
i--;
if(i<0){i=docs.length-1;}
show();
}

</script>

</body>
</html>
