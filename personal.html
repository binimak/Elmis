<div class="upload-box">

<h3>Upload receipt (photo) / የክፍያ ደረሰኝ ፎቶ</h3>

<div class="upload-area">

<input type="file" id="receipt" accept="image/png, image/jpeg" capture="environment">

<label for="receipt" class="choose-btn">
📷 Choose / Take Photo
</label>

<span id="file-name">No file chosen</span>

</div>

<button class="submit-btn">Submit</button>

</div>

<style>

.upload-area{
border:2px dashed #cbd5e1;
padding:25px;
border-radius:12px;
text-align:center;
background:#f8fafc;
}

/* Choose photo button */

.choose-btn{
background:#0f766e;
color:white;
padding:14px 22px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
display:inline-block;
margin-top:10px;
}

.choose-btn:hover{
background:#115e59;
}

input[type="file"]{
display:none;
}

/* Submit button */

.submit-btn{
margin-top:20px;
padding:10px 20px;
background:#e2e8f0;
color:#0f172a;
border:none;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#cbd5e1;
}

#file-name{
display:block;
margin-top:10px;
color:#555;
font-size:14px;
}

</style>

<script>
document.getElementById("receipt").addEventListener("change", function(){
const fileName = this.files[0]?.name || "No file chosen";
document.getElementById("file-name").textContent = fileName;
});
</script>
