<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Upload</title>

<style>

body{
font-family: Arial;
background:#f2f4f8;
text-align:center;
margin:0;
}

h1{
color:#2c6fb7;
margin-top:30px;
}

.upload-box{
width:90%;
max-width:700px;
margin:40px auto;
border:3px dashed #2c6fb7;
border-radius:15px;
padding:30px;
background:white;
}

.upload-box input{
margin-top:20px;
}

.preview{
margin-top:25px;
}

.preview img{
width:100%;
max-height:400px;
object-fit:cover;
border-radius:12px;
border:3px solid #2c6fb7;
}

</style>

</head>
<body>

<h1>Upload Photo</h1>

<div class="upload-box">

<p>Choose or take a photo</p>

<input type="file" accept="image/*" onchange="previewImage(event)">

<div class="preview">
<img id="output">
</div>

</div>

<script>

function previewImage(event){
var reader = new FileReader();
reader.onload = function(){
var output = document.getElementById('output');
output.src = reader.result;
}
reader.readAsDataURL(event.target.files[0]);
}

</script>

</body>
</html>
