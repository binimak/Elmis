<div class="upload-box">
  <h3>Upload receipt (photo) / የክፍያ ደረሰኝ ፎቶ</h3>
  <p>Take a photo or choose from gallery. Image will be compressed client-side to reduce upload size.</p>

  <div class="upload-area">
    <p><strong>Receipt photo / የክፍያ ደረሰኝ ፎቶ</strong></p>
    <p>Click to choose or tap to open camera. Allowed: JPG/PNG. Keep under 8MB.</p>

    <input type="file" id="receipt" accept="image/png, image/jpeg" capture="environment">
    
    <label for="receipt" class="upload-btn">Choose / Take photo</label>
    <span id="file-name">No file chosen</span>
  </div>

  <button class="submit-btn">Submit receipt</button>
</div>

<style>
.upload-box{
  padding:20px;
  font-family:Arial;
}

.upload-area{
  border:2px dashed #cbd5e1;
  padding:25px;
  border-radius:10px;
  text-align:left;
  background:#f8fafc;
}

.upload-btn{
  background:#0f766e;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  display:inline-block;
  margin-top:10px;
}

input[type="file"]{
  display:none;
}

.submit-btn{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#0f2a44;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

#file-name{
  margin-left:10px;
  color:#555;
}
</style>

<script>
document.getElementById("receipt").addEventListener("change", function(){
  const fileName = this.files[0]?.name || "No file chosen";
  document.getElementById("file-name").textContent = fileName;
});
</script>
