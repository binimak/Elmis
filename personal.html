<!DOCTYPE html>
<html>
<head>
<title>Personal Page</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
#idcard{
border:1px solid black;
width:300px;
padding:10px;
margin-top:20px;
}
</style>

</head>

<body>

<h2>Personal Information</h2>

<img id="photo" src="" width="150">
<br><br>

<img id="documentphoto" src="" width="200">

<table border="1">

<tr>
<td>Name</td>
<td id="name"></td>
</tr>

<tr>
<td>Gender</td>
<td id="gender"></td>
</tr>

<tr>
<td>Age</td>
<td id="age"></td>
</tr>

<tr>
<td>Date of Birth</td>
<td id="dob"></td>
</tr>

<tr>
<td>ID Number</td>
<td id="id"></td>
</tr>

<tr>
<td>Phone Number</td>
<td id="phone"></td>
</tr>

<tr>
<td>Place</td>
<td id="place"></td>
</tr>

<tr>
<td>Country</td>
<td id="country"></td>
</tr>

<tr>
<td>Status</td>
<td id="status"></td>
</tr>

<tr>
<td>Register Date</td>
<td id="reg"></td>
</tr>

<tr>
<td>Last Update</td>
<td id="update"></td>
</tr>

</table>

<br><br>

<h3>Upload Payment Receipt</h3>

<input type="file" id="receipt">
<p id="file-name">No file chosen</p>

<br>
<img id="receipt-preview" width="200">

<br><br>

<h3>Your QR Code</h3>
<div id="qrcode"></div>

<br><br>

<button onclick="downloadID()">Download ID Card</button>

<div id="idcard">

<h3>ID CARD</h3>

<img id="cardphoto" width="100"><br>

Name: <span id="cardname"></span><br>
ID: <span id="cardid"></span><br>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="index.html";
}

document.getElementById("photo").src = user.photo;
document.getElementById("documentphoto").src = user.documentphoto;

document.getElementById("name").innerHTML = user.name;
document.getElementById("gender").innerHTML = user.gender;
document.getElementById("age").innerHTML = user.age;
document.getElementById("dob").innerHTML = user.dob;
document.getElementById("id").innerHTML = user.id;
document.getElementById("phone").innerHTML = user.phone;
document.getElementById("place").innerHTML = user.place;
document.getElementById("country").innerHTML = user.country;

document.getElementById("status").innerHTML = "✔ Verified";

document.getElementById("reg").innerHTML = user.reg;
document.getElementById("update").innerHTML = user.update;

document.getElementById("cardphoto").src = user.photo;
document.getElementById("cardname").innerHTML = user.name;
document.getElementById("cardid").innerHTML = user.id;

document.getElementById("receipt").addEventListener("change", function(){

const file = this.files[0];

const fileName = file ? file.name : "No file chosen";

document.getElementById("file-name").textContent = fileName;

if(file){

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("receipt-preview").src = e.target.result;

}

reader.readAsDataURL(file);

}

});

new QRCode(document.getElementById("qrcode"), {

text: user.id,
width: 150,
height: 150

});

function downloadID(){

const link = document.createElement("a");

link.download = "ID-Card.html";

link.href = "data:text/html;charset=utf-8," + encodeURIComponent(document.documentElement.outerHTML);

link.click();

}

</script>

</body>
</html>
